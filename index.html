const Icon = ({name, size=20}) => <span style={{width:size,height:size,display:"inline-flex",flexShrink:0}}>{I[name]}</span>;
const Badge = ({status}) => {
  const c = {Valid:"#10B981",Expiring:"#F59E0B",Expired:"#EF4444","In Progress":"#0B53CC",Complete:"#10B981"}[status]||"#0B53CC";
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 12px",borderRadius:50,fontSize:"0.72rem",fontWeight:600,background:`${c}14`,color:c}}>

/* ══════════════════════════════════════════
   STYLES
   ══════════════════════════════════════════ */
const css = `
@keyframes dotPulse{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:.8;transform:scale(1.2)}}
@keyframes ringPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.1;transform:scale(1.04)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.mu-fade{animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}
.mu-d1{animation-delay:.1s}.mu-d2{animation-delay:.2s}.mu-d3{animation-delay:.3s}.mu-d4{animation-delay:.4s}.mu-d5{animation-delay:.5s}.mu-d6{animation-delay:.6s}
.mu-card:hover{transform:translateY(-5px)!important;box-shadow:0 12px 40px rgba(10,22,40,.1)!important}
.mu-vcard:hover{transform:translateY(-5px)!important;box-shadow:0 12px 40px rgba(0,0,0,.3)!important;border-color:rgba(255,255,255,.18)!important}
.mu-step:hover .mu-step-n{background:#0B53CC!important;color:#fff!important;box-shadow:0 8px 30px rgba(11,83,204,.3)!important}
.mu-tr:hover{background:rgba(11,83,204,.03)}
.mu-faq:hover{background:rgba(11,83,204,.02)}
.mu-doc:hover{border-color:rgba(10,22,40,.15)!important}
.mu-doc.open{border-color:#0B53CC!important;box-shadow:0 4px 24px rgba(11,83,204,.12)!important}
.mu-doc.open .mu-doc-icon{background:#0B53CC!important}
.mu-doc.open .mu-doc-icon span{filter:grayscale(1) brightness(10)}
.mu-doc.open .mu-doc-tog{background:#0B53CC!important;color:#fff!important;transform:rotate(45deg)}
.mu-trust:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(10,22,40,.08)}
.mu-pcard:hover{transform:translateY(-4px)!important;border-color:rgba(11,83,204,.25)!important;background:rgba(255,255,255,.06)!important}
.mu-input:focus{border-color:#0B53CC!important;box-shadow:0 0 0 3px rgba(11,83,204,.1)!important}
`;

/* ══════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════ */
function App() {
  const [view, setView] = useState("website");
  const [portalPage, setPortalPage] = useState("dashboard");
  const [searchQ, setSearchQ] = useState("");
  const [filter, setFilter] = useState("All");
  const [selectedDoc, setSelectedDoc] = useState(null);
  const [toast, setToast] = useState(null);
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginError, setLoginError] = useState("");
  const [openFaq, setOpenFaq] = useState(null);
  const [openDocCard, setOpenDocCard] = useState(null);

  useEffect(() => { if(toast){const t=setTimeout(()=>setToast(null),3e3);return()=>clearTimeout(t)} }, [toast]);

  const expired = DOCS.filter(d=>d.status==="Expired");
  const expiring = DOCS.filter(d=>d.status==="Expiring");
  const valid = DOCS.filter(d=>d.status==="Valid");
  const filtered = DOCS.filter(d => {
    const mf = filter==="All"||d.status===filter;
    const ms = !searchQ||d.type.toLowerCase().includes(searchQ.toLowerCase())||d.id.toLowerCase().includes(searchQ.toLowerCase())||Object.values(d.fields).some(v=>v.toLowerCase().includes(searchQ.toLowerCase()));
    return mf&&ms;
  });

  const goPortal = () => { setView("login"); setLoginEmail(""); setLoginPass(""); setLoginError(""); };
  const goWebsite = () => { setView("website"); setPortalPage("dashboard"); setSearchQ(""); setFilter("All"); setSelectedDoc(null); };
  const handleLogin = () => { if(!loginEmail||!loginPass){setLoginError("Please enter email and password");return;} setView("portal"); setPortalPage("dashboard"); };
  const openDoc = d => { setSelectedDoc(d); setPortalPage("docview"); };

  const S = { // shared styles
    nav:{position:"sticky",top:0,zIndex:100,background:"rgba(255,255,255,.88)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:"1px solid rgba(10,22,40,.06)",padding:"0 32px"},
    navIn:{maxWidth:1200,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",height:66},
    logo:{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:"1.2rem",display:"flex",alignItems:"center",gap:9,cursor:"pointer",background:"none",border:"none",color:"#0A1628",padding:0},
    logoMark:{width:32,height:32,background:"linear-gradient(135deg,#0B53CC,#3D7BF5)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:".62rem",fontWeight:800},
    btn:{background:"#0B53CC",color:"#fff",padding:"10px 24px",borderRadius:50,fontWeight:600,fontSize:".88rem",border:"none",cursor:"pointer",fontFamily:"inherit",transition:"all .3s"},
    btnGhost:{color:"#0B53CC",fontSize:".88rem",fontWeight:600,padding:"9px 20px",borderRadius:50,border:"1.5px solid rgba(11,83,204,.2)",background:"none",cursor:"pointer",fontFamily:"inherit",transition:"all .3s"},
    section:{padding:"110px 32px"},
    container:{maxWidth:1200,margin:"0 auto"},
    label:{fontSize:".76rem",fontWeight:700,textTransform:"uppercase",letterSpacing:2.5,color:"#0B53CC",marginBottom:14,display:"inline-block"},
    labelLight:{fontSize:".76rem",fontWeight:700,textTransform:"uppercase",letterSpacing:2.5,color:"#3D7BF5",marginBottom:14,display:"inline-block"},
    title:{fontFamily:"'Sora',sans-serif",fontSize:"clamp(2rem,4vw,2.8rem)",fontWeight:800,lineHeight:1.12,letterSpacing:-.5,marginBottom:16},
    sub:{color:"rgba(10,22,40,.55)",fontSize:"1.05rem",maxWidth:580},
  };

  /* ═══════════════════════════════════════
     WEBSITE
     ═══════════════════════════════════════ */
  if(view==="website") return (
    <div style={{fontFamily:"'Outfit',sans-serif",background:"#FAFBFF",color:"#0A1628"}}>
      <style>{css}</style>

      {/* NAV */}
      <nav style={S.nav}><div style={S.navIn}>
        <button style={S.logo} onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}><span style={S.logoMark}>IQ</span>Morph IQ</button>
        <div style={{display:"flex",alignItems:"center",gap:30}}>
          {["Services","How It Works","Documents","Portal","Contact"].map(l=><a key={l} href={`#${l.toLowerCase().replace(/ /g,"-")}`} style={{color:"rgba(10,22,40,.55)",fontSize:".88rem",fontWeight:500,textDecoration:"none"}}>{l}</a>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={goPortal} style={S.btnGhost}>Client Portal</button>
          <a href="#get-started" style={{...S.btn,textDecoration:"none",display:"inline-block"}}>Get Started</a>
        </div>
      </div></nav>

      {/* HERO */}
      <section style={{background:"linear-gradient(160deg,#FAFBFF 0%,#E8EEFF 50%,#D6E4FF 100%)",padding:"60px 32px 0",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-300,right:-200,width:900,height:900,background:"radial-gradient(circle,rgba(11,83,204,.1) 0%,transparent 65%)",pointerEvents:"none"}}/>
        <div style={{textAlign:"center",maxWidth:720,margin:"0 auto",paddingTop:60,position:"relative",zIndex:2}} className="mu-fade">
          <h1 style={{fontFamily:"'Sora'",fontSize:"clamp(2.8rem,5.5vw,4rem)",lineHeight:1.06,fontWeight:800,letterSpacing:-1.5,marginBottom:24}}>Still searching through <span style={{color:"#0B53CC",position:"relative",display:"inline-block"}}>filing cabinets?<span style={{position:"absolute",bottom:2,left:0,right:0,height:8,background:"rgba(11,83,204,.12)",borderRadius:4}}/></span></h1>
          <p style={{fontSize:"1.15rem",color:"rgba(10,22,40,.55)",maxWidth:560,margin:"0 auto 36px",lineHeight:1.7}}>We turn your paper documents into a searchable, organised digital archive — with every key detail verified and ready to find in seconds.</p>
          <div style={{display:"flex",gap:16,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}}>
            <a href="#get-started" style={{...S.btn,padding:"16px 36px",fontSize:"1rem",textDecoration:"none"}}>Request a Consultation</a>
            <a href="#how-it-works" style={{color:"rgba(10,22,40,.45)",fontWeight:500,fontSize:".95rem",textDecoration:"none"}}>See how it works ↓</a>
          </div>
        </div>
        {/* PROCESS ILLUSTRATION */}
        <div style={{maxWidth:1100,margin:"48px auto 0"}} className="mu-fade mu-d2">
          <div style={{background:"#fff",border:"1px solid rgba(10,22,40,.07)",borderRadius:28,padding:"44px 36px 36px",boxShadow:"0 20px 60px rgba(10,22,40,.06)",display:"flex",alignItems:"flex-start",justifyContent:"center"}}>
            {[{n:"01",name:"Paper Documents",sub:"~500+ pages",ic:"📄"},{n:"02",name:"Scan & OCR",sub:"High-res + text extraction",ic:"🖨️"},{n:"03",name:"Verify & Organise",sub:"8 fields human-checked",ic:"✅"},{n:"04",name:"AI-Powered Portal",sub:"24/7 secure access",ic:"🧠",special:true}].map((s,i)=>(
              <div key={s.n} style={{display:"contents"}}>
                {i>0&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"55px 8px 0",flexShrink:0}}>
                  {[0,1,2].map(d=><div key={d} style={{width:7,height:7,borderRadius:"50%",background:i===3?"#00D4AA":"#0B53CC",opacity:.3+d*.2,animation:`dotPulse 1.8s ease infinite ${d*.3}s`}}/>)}
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={i===3?"#00D4AA":"#0B53CC"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>}
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,flex:1,maxWidth:190}}>
                  <div style={{width:"100%",aspectRatio:"1/1.05",background:s.special?"linear-gradient(135deg,rgba(11,83,204,.08),rgba(0,212,170,.06))":"#EBF1FF",border:s.special?"2px solid #0B53CC":"1.5px solid rgba(10,22,40,.06)",borderRadius:20,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",boxShadow:s.special?"0 0 40px rgba(11,83,204,.12)":"none"}}>
                    {s.special&&<div style={{position:"absolute",inset:-10,borderRadius:26,border:"1px solid rgba(11,83,204,.08)",animation:"ringPulse 4s ease infinite"}}/>}
                    <span style={{fontSize:"2.8rem",marginBottom:6}}>{s.ic}</span>
                    <span style={{fontSize:".7rem",fontWeight:600,color:"rgba(10,22,40,.4)"}}>{s.sub}</span>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontFamily:"'Sora'",fontSize:".68rem",fontWeight:800,color:s.special?"#00D4AA":"#0B53CC",opacity:s.special?1:.5}}>{s.n}</div>
                    <div style={{fontFamily:"'Sora'",fontSize:".8rem",fontWeight:700}}>{s.name}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* STATS */}
        <div style={{display:"flex",justifyContent:"center",gap:60,padding:"44px 0 50px",flexWrap:"wrap"}} className="mu-fade mu-d3">
          {[{n:"8",l:"Key fields per doc"},{n:"100%",l:"Human-checked"},{n:"5 day",l:"Turnaround"}].map(s=><div key={s.l} style={{textAlign:"center"}}><div style={{fontFamily:"'Sora'",fontSize:"2.2rem",fontWeight:800,color:"#0B53CC"}}>{s.n}</div><div style={{fontSize:".8rem",color:"rgba(10,22,40,.35)",marginTop:2}}>{s.l}</div></div>)}
        </div>
      </section>

      {/* PROBLEM */}
      <section style={{...S.section,background:"#fff"}}>
        <div style={S.container}>
          <div style={S.label}>The problem</div>
          <div style={S.title}>The hidden cost of unmanaged documents</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:24,marginTop:48}}>
            {[{ic:"🗄️",t:"Inefficient retrieval",d:"Time spent locating contracts and compliance documents adds up fast across requests, audits, and daily operations."},{ic:"⚠️",t:"Regulatory exposure",d:"When certificates and renewal dates live in physical archives, critical deadlines get missed — leading to fines and risk."},{ic:"📦",t:"Growing backlog",d:"Forms, invoices, and correspondence compound over time. Without digitisation, finding anything becomes increasingly painful."}].map((c,i)=>(
              <div key={c.t} className={`mu-card mu-fade mu-d${i+1}`} style={{background:"#FAFBFF",border:"1px solid rgba(10,22,40,.06)",borderRadius:16,padding:"36px 28px",transition:"all .4s",cursor:"default"}}>
                <span style={{fontSize:"2rem",display:"block",marginBottom:18}}>{c.ic}</span>
                <h3 style={{fontFamily:"'Sora'",fontSize:"1.05rem",fontWeight:700,marginBottom:10}}>{c.t}</h3>
                <p style={{fontSize:".9rem",color:"rgba(10,22,40,.55)",lineHeight:1.6}}>{c.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* SERVICES */}
      <section id="services" style={{...S.section,background:"#020818",color:"#fff"}}>
        <div style={S.container}>
          <div style={{textAlign:"center",marginBottom:52}}>
            <div style={S.labelLight}>Our services</div>
            <div style={{...S.title,color:"#fff"}}>Everything you need to go digital</div>
            <p style={{color:"rgba(255,255,255,.5)",fontSize:"1.05rem",maxWidth:560,margin:"0 auto"}}>From collection to searchable archive — we handle every step with precision.</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:24}}>
            {[{t:"Professional Scanning",d:"High-resolution scanning of every document format and condition.",i:"scan"},{t:"OCR & Text Extraction",d:"Every scan becomes searchable — find documents by any keyword.",i:"search"},{t:"Key Field Verification",d:"Up to 8 critical fields per doc, human-verified and indexed.",i:"docs"},{t:"Organised Archive",d:"Structured folders + master spreadsheet. Find anything instantly.",i:"folder"},{t:"Expiry Tracking",d:"Every dated document flagged. Never miss a renewal deadline.",i:"shield"},{t:"Client Portal",d:"24/7 access via our secure portal with search, alerts, and downloads.",i:"monitor"}].map((s,i)=>(

      </div>
      <div style={{padding:"14px 18px",borderTop:"1px solid rgba(10,22,40,.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:"#EBF1FF",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="user" size={16}/></div>
          <div><div style={{fontSize:".85rem",fontWeight:600}}>Demo User</div><div style={{fontSize:".72rem",color:"rgba(10,22,40,.35)"}}>Harlow Lettings</div></div>
        </div>
        <button onClick={goWebsite} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:8,borderRadius:8,border:"1px solid rgba(10,22,40,.06)",background:"none",cursor:"pointer",fontSize:".78rem",fontWeight:500,color:"rgba(10,22,40,.45)",fontFamily:"inherit"}}>
          <Icon name="logout" size={14}/>Sign out
        </button>
      </div>
    </div>
  );

  const Dashboard = () => (
    <div>
      <h1 style={{fontFamily:"'Sora'",fontSize:"1.6rem",fontWeight:800,marginBottom:4}}>Good morning</h1>
      <p style={{color:"rgba(10,22,40,.45)",marginBottom:28}}>Your document archive at a glance</p>
      {(expired.length>0||expiring.length>0)&&<div style={{background:expired.length?"#FEF2F2":"#FFFBEB",border:`1px solid ${expired.length?"rgba(239,68,68,.3)":"rgba(245,158,11,.3)"}`,borderRadius:12,padding:"14px 20px",marginBottom:24,display:"flex",alignItems:"center",gap:12,fontSize:".9rem",fontWeight:500}}>
        <Icon name="alert" size={18}/><span><strong>{expired.length} expired</strong>{expiring.length>0?` and ${expiring.length} expiring`:""} — need attention</span>
        <a onClick={()=>setPortalPage("compliance")} style={{marginLeft:"auto",fontWeight:700,cursor:"pointer",color:"#0B53CC",fontSize:".85rem"}}>View →</a>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:32}}>
        {[{l:"Total Documents",v:DOCS.length,s:"in archive"},{l:"Expiring Soon",v:expiring.length,c:"#F59E0B",s:"within 30 days"},{l:"Expired",v:expired.length,c:"#EF4444",s:"need renewal"},{l:"Recent Uploads",v:4,s:"this week"}].map(m=>(
          <div key={m.l} style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:12,padding:"22px 24px"}}>
            <div style={{fontSize:".7rem",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"rgba(10,22,40,.3)",marginBottom:8}}>{m.l}</div>
            <div style={{fontFamily:"'Sora'",fontSize:"2rem",fontWeight:800,lineHeight:1,color:m.c||"#0A1628"}}>{m.v}</div>
            <div style={{fontSize:".78rem",color:"rgba(10,22,40,.35)",marginTop:6}}>{m.s}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontFamily:"'Sora'",fontSize:"1.08rem",fontWeight:700}}>Recent Documents</h2>
        <a onClick={()=>setPortalPage("documents")} style={{fontSize:".85rem",fontWeight:600,cursor:"pointer",color:"#0B53CC"}}>View all →</a>
      </div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid rgba(10,22,40,.05)",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Doc ID","Type","Date","Status",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:".7rem",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"rgba(10,22,40,.3)",borderBottom:"1px solid rgba(10,22,40,.05)"}}>{h}</th>)}</tr></thead>
        <tbody>{DOCS.slice(0,6).map(d=><tr key={d.id} className="mu-tr" onClick={()=>openDoc(d)} style={{borderBottom:"1px solid rgba(10,22,40,.03)",cursor:"pointer",transition:"background .15s"}}>
          <td style={{padding:"13px 16px",fontWeight:700,fontSize:".83rem",fontFamily:"'Sora',monospace"}}>{d.id}</td><td style={{padding:"13px 16px",fontSize:".88rem"}}>{d.type}</td><td style={{padding:"13px 16px",fontSize:".85rem",color:"rgba(10,22,40,.45)"}}>{d.date}</td><td style={{padding:"13px 16px"}}><Badge status={d.status}/></td><td style={{padding:"13px 16px",textAlign:"right",color:"rgba(10,22,40,.25)"}}><Icon name="arrow" size={14}/></td>
        </tr>)}</tbody></table>
      </div>
    </div>
  );

  const Documents = () => (
    <div>
      <h1 style={{fontFamily:"'Sora'",fontSize:"1.6rem",fontWeight:800,marginBottom:4}}>Documents</h1>
      <p style={{color:"rgba(10,22,40,.45)",marginBottom:20}}>{filtered.length} documents{filter!=="All"?` (${filter})`:""}</p>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {["All","Valid","Expiring","Expired"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"7px 18px",borderRadius:50,border:"1px solid rgba(10,22,40,.08)",background:filter===f?"#0B53CC":"transparent",color:filter===f?"#fff":"#0A1628",fontFamily:"inherit",fontSize:".82rem",fontWeight:600,cursor:"pointer"}}>{f}</button>)}
      </div>
      <div style={{position:"relative",marginBottom:20}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"rgba(10,22,40,.25)"}}><Icon name="search" size={16}/></span><input className="mu-input" placeholder="Filter documents..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} style={{width:"100%",padding:"11px 16px 11px 40px",borderRadius:10,border:"1px solid rgba(10,22,40,.06)",background:"#fff",fontSize:".9rem",fontFamily:"inherit",outline:"none",transition:"all .3s"}}/></div>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid rgba(10,22,40,.05)",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Doc ID","Type","Category","Date","Status",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:".7rem",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"rgba(10,22,40,.3)",borderBottom:"1px solid rgba(10,22,40,.05)"}}>{h}</th>)}</tr></thead>
        <tbody>{filtered.map(d=><tr key={d.id} className="mu-tr" onClick={()=>openDoc(d)} style={{borderBottom:"1px solid rgba(10,22,40,.03)",cursor:"pointer",transition:"background .15s"}}>
          <td style={{padding:"12px 16px",fontWeight:700,fontSize:".83rem",fontFamily:"'Sora',monospace"}}>{d.id}</td><td style={{padding:"12px 16px",fontSize:".88rem"}}>{d.type}</td><td style={{padding:"12px 16px",fontSize:".83rem",color:"rgba(10,22,40,.45)"}}>{d.cat}</td><td style={{padding:"12px 16px",fontSize:".83rem",color:"rgba(10,22,40,.45)"}}>{d.date}</td><td style={{padding:"12px 16px"}}><Badge status={d.status}/></td><td style={{padding:"12px 16px",textAlign:"right",color:"rgba(10,22,40,.25)"}}><Icon name="arrow" size={14}/></td>
        </tr>)}</tbody></table>
      </div>
    </div>
  );

  const Search = () => (
    <div>
      <h1 style={{fontFamily:"'Sora'",fontSize:"1.6rem",fontWeight:800,marginBottom:4}}>Search</h1>
      <p style={{color:"rgba(10,22,40,.45)",marginBottom:24}}>Find any document by content, address, or reference</p>
      <div style={{position:"relative",marginBottom:28}}><span style={{position:"absolute",left:18,top:"50%",transform:"translateY(-50%)",color:"rgba(10,22,40,.25)"}}><Icon name="search" size={18}/></span><input className="mu-input" autoFocus placeholder='Try "Oak Road" or "SafeGas"...' value={searchQ} onChange={e=>setSearchQ(e.target.value)} style={{width:"100%",padding:"16px 20px 16px 50px",borderRadius:50,border:"1px solid rgba(10,22,40,.06)",background:"#fff",fontSize:"1rem",fontFamily:"inherit",outline:"none",boxShadow:"0 4px 20px rgba(10,22,40,.04)",transition:"all .3s"}}/></div>
      {searchQ?<>{filtered.map(d=><div key={d.id} onClick={()=>openDoc(d)} style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:12,padding:"18px 22px",marginBottom:10,cursor:"pointer",transition:"border-color .3s"}} className="mu-doc">
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}><span style={{fontWeight:700,fontFamily:"'Sora',monospace",fontSize:".83rem"}}>{d.id}</span><Badge status={d.status}/><span style={{fontSize:".83rem",color:"rgba(10,22,40,.35)",marginLeft:"auto"}}>{d.date}</span></div>
        <div style={{fontWeight:600,fontSize:".95rem",marginBottom:4}}>{d.type}</div>
        <div style={{fontSize:".85rem",color:"rgba(10,22,40,.45)"}}>{Object.entries(d.fields).map(([k,v])=><span key={k} style={{marginRight:14}}><span style={{opacity:.5}}>{k}: </span><span style={{fontWeight:v.toLowerCase().includes(searchQ.toLowerCase())?700:400,color:v.toLowerCase().includes(searchQ.toLowerCase())?"#0B53CC":"inherit"}}>{v}</span></span>)}</div>
      </div>)}</>:<div style={{textAlign:"center",padding:60,color:"rgba(10,22,40,.25)"}}>Search across all {DOCS.length} documents</div>}
    </div>
  );

  const Compliance = () => (
    <div>
      <h1 style={{fontFamily:"'Sora'",fontSize:"1.6rem",fontWeight:800,marginBottom:4}}>Compliance</h1>
      <p style={{color:"rgba(10,22,40,.45)",marginBottom:28}}>Track expiry dates and stay compliant</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:32}}>
        {[{t:"Expired",d:expired,c:"#EF4444"},{t:"Expiring Soon",d:expiring,c:"#F59E0B"},{t:"Valid",d:valid.filter(x=>x.expiry),c:"#10B981"}].map(s=><div key={s.t} style={{background:`${s.c}08`,border:`1px solid ${s.c}`,borderRadius:12,padding:"20px 24px",textAlign:"center"}}><div style={{fontFamily:"'Sora'",fontSize:"2rem",fontWeight:800,color:s.c}}>{s.d.length}</div><div style={{fontSize:".85rem",fontWeight:600,color:s.c}}>{s.t}</div></div>)}
      </div>
      {[{t:"Expired",d:expired,c:"#EF4444"},{t:"Expiring Soon",d:expiring,c:"#F59E0B"}].map(s=>s.d.length>0&&<div key={s.t} style={{marginBottom:24}}>
        <h3 style={{fontSize:"1rem",fontWeight:700,marginBottom:12,color:s.c}}>{s.t} ({s.d.length})</h3>
        {s.d.map(d=><div key={d.id} onClick={()=>openDoc(d)} className="mu-doc" style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:10,padding:"14px 18px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"border-color .3s"}}>
          <div><div style={{fontWeight:600}}>{d.type}</div><div style={{fontSize:".82rem",color:"rgba(10,22,40,.4)"}}>{Object.values(d.fields)[0]}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:".85rem",fontWeight:600,marginBottom:4}}>{d.expiry}</div><Badge status={d.status}/></div>
        </div>)}
      </div>)}
    </div>
  );

  const RequestScan = () => (
    <div>
      <h1 style={{fontFamily:"'Sora'",fontSize:"1.6rem",fontWeight:800,marginBottom:4}}>Request Scanning Job</h1>
      <p style={{color:"rgba(10,22,40,.45)",marginBottom:28}}>Submit a request and we'll arrange collection</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:40}}>
        <div style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:16,padding:32}}>
          <h3 style={{fontFamily:"'Sora'",fontWeight:700,marginBottom:20}}>New Request</h3>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:"rgba(10,22,40,.35)",marginBottom:6}}>Estimated Documents</label><select className="mu-input" style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid rgba(10,22,40,.06)",background:"#FAFBFF",fontFamily:"inherit",fontSize:".9rem",outline:"none"}}><option>Select...</option><option>Under 100</option><option>100-500</option><option>500-1,000</option><option>1,000+</option></select></div>
          <div style={{marginBottom:16}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:"rgba(10,22,40,.35)",marginBottom:6}}>Preferred Date</label><input className="mu-input" type="date" style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid rgba(10,22,40,.06)",background:"#FAFBFF",fontFamily:"inherit",fontSize:".9rem",outline:"none"}}/></div>
          <div style={{marginBottom:20}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:"rgba(10,22,40,.35)",marginBottom:6}}>Notes</label><textarea className="mu-input" rows={3} style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid rgba(10,22,40,.06)",background:"#FAFBFF",fontFamily:"inherit",fontSize:".9rem",resize:"vertical",outline:"none"}}/></div>
          <button onClick={()=>setToast("Request submitted!")} style={{...S.btn,width:"100%",padding:14,borderRadius:50}}>Submit Request</button>
        </div>
        <div>
          <h3 style={{fontFamily:"'Sora'",fontWeight:700,marginBottom:16}}>Previous Requests</h3>
          {REQUESTS.map(r=><div key={r.id} style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:10,padding:"16px 20px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontWeight:700,fontFamily:"'Sora',monospace",fontSize:".85rem"}}>{r.id}</span><Badge status={r.status}/></div>
            <div style={{fontSize:".85rem",color:"rgba(10,22,40,.45)"}}>{r.date} · {r.docs} docs</div>
            <div style={{fontSize:".85rem",color:"rgba(10,22,40,.35)",marginTop:4}}>{r.notes}</div>
          </div>)}
        </div>
      </div>
    </div>
  );

  const DocView = () => {
    if(!selectedDoc) return null; const d = selectedDoc;
    return <div>
      <button onClick={()=>setPortalPage("documents")} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"rgba(10,22,40,.45)",fontFamily:"inherit",fontSize:".88rem",cursor:"pointer",padding:0,marginBottom:20}}><Icon name="back" size={16}/> Back to Documents</button>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:28}}><span style={{fontFamily:"'Sora',monospace",fontWeight:800,fontSize:"1.3rem"}}>{d.id}</span><Badge status={d.status}/><span style={{color:"rgba(10,22,40,.45)",fontSize:".9rem"}}>{d.type}</span></div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:28}}>
        <div><div style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:12,padding:24}}>
          <div style={{fontSize:".74rem",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"rgba(10,22,40,.3)",marginBottom:18}}>Document Fields</div>
          {Object.entries(d.fields).map(([k,v])=><div key={k} style={{marginBottom:16}}><div style={{fontSize:".7rem",fontWeight:600,textTransform:"uppercase",letterSpacing:.8,color:"rgba(10,22,40,.3)",marginBottom:3}}>{k}</div><div style={{fontSize:".92rem",fontWeight:500}}>{v}</div></div>)}
          <div style={{borderTop:"1px solid rgba(10,22,40,.05)",paddingTop:14,marginTop:8}}><div style={{fontSize:".7rem",fontWeight:600,textTransform:"uppercase",color:"rgba(10,22,40,.3)",marginBottom:3}}>Scanned</div><div style={{fontSize:".88rem"}}>{d.date}</div></div>
          {d.expiry&&<div style={{marginTop:12}}><div style={{fontSize:".7rem",fontWeight:600,textTransform:"uppercase",color:"rgba(10,22,40,.3)",marginBottom:3}}>Expires</div><div style={{fontSize:".88rem"}}>{d.expiry}</div></div>}
        </div>
        <button onClick={()=>setToast(`Downloading ${d.id}.pdf`)} style={{...S.btn,width:"100%",marginTop:12,borderRadius:50,padding:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Icon name="download" size={16}/> Download PDF</button></div>
        <div style={{background:"#fff",border:"1px solid rgba(10,22,40,.05)",borderRadius:12,minHeight:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",color:"rgba(10,22,40,.25)",padding:40}}><div style={{width:48,height:48,margin:"0 auto 16px",opacity:.3}}>{I.docs}</div><p style={{fontWeight:600,fontSize:".95rem",marginBottom:4}}>{d.id}.pdf</p><p style={{fontSize:".85rem"}}>PDF preview would load here</p></div>
        </div>
      </div>
    </div>;
  };

  const pages = {dashboard:Dashboard,documents:Documents,search:Search,compliance:Compliance,request:RequestScan,docview:DocView};
  const Page = pages[portalPage]||Dashboard;

  return (
    <div style={{fontFamily:"'Outfit',sans-serif",display:"flex",background:"#FAFBFF",color:"#0A1628",minHeight:"100vh"}}>
      <style>{css}</style>
      <SideNav/>
      <div style={{flex:1,minHeight:"100vh"}}><div style={{maxWidth:1050,margin:"0 auto",padding:"32px 40px"}}><Page/></div></div>
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#0A1628",color:"#fff",padding:"14px 28px",borderRadius:50,fontSize:".9rem",fontWeight:600,boxShadow:"0 12px 40px rgba(0,0,0,.15)",zIndex:1e3}}>✓ {toast}</div>}
    </div>
  );
}


    // Mount
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
